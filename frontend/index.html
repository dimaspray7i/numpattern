<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NumPattern — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="grid-overlay"></div>
    <div class="floating-numbers" id="floatingNumbers"></div>
  </div>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-logo">N<span>P</span></div>
      <h1 class="brand-name">NumPattern</h1>
      <p class="brand-tagline">Decode the sequence. Master the pattern.</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="tab-content active" id="tab-login">
        <form id="loginForm" class="auth-form" novalidate>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required />
            <span class="field-error" id="loginEmailErr"></span>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
            <span class="field-error" id="loginPasswordErr"></span>
          </div>
          <div class="form-error" id="loginFormErr"></div>
          <button type="submit" class="btn-primary" id="loginBtn">
            <span class="btn-text">Enter Game</span>
            <span class="btn-loader hidden">▪ ▪ ▪</span>
          </button>
        </form>
      </div>

      <!-- REGISTER FORM -->
      <div class="tab-content" id="tab-register">
        <form id="registerForm" class="auth-form" novalidate>
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="regName" placeholder="Your name" required />
            <span class="field-error" id="regNameErr"></span>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="you@example.com" required />
            <span class="field-error" id="regEmailErr"></span>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Min 6 characters" required />
            <span class="field-error" id="regPasswordErr"></span>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="regPasswordConfirm" placeholder="Repeat password" required />
            <span class="field-error" id="regConfirmErr"></span>
          </div>
          <div class="form-error" id="regFormErr"></div>
          <button type="submit" class="btn-primary" id="registerBtn">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader hidden">▪ ▪ ▪</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
